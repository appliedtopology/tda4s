name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run tests
        run: sbt clean test
      - name: Binary Compatibility Checks
        run: sbt mimaReportBinaryIssues